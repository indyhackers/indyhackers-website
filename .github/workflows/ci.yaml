name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

env:
  IMAGE_NAME: apoland/indyhackers

jobs:
  vitest:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:vitest:ci

  playwright:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: apoland
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build, tag, and push image to Dockerhub
        id: build-image
        env:
          VERSION: ${{ github.sha }}
        run: |
          docker compose -f docker-compose.yaml -f docker-compose_production.yaml build
          docker push $IMAGE_NAME:$VERSION
          echo "image=$IMAGE_NAME:$VERSION" >> $GITHUB_OUTPUT

  cd-prod:
    if: github.ref == 'refs/heads/main'
    needs: [build]
    uses: ./.github/workflows/cd.yaml
    with:
      image: ${{ needs.build.outputs.image }}
      ssh_user: indyhackers
      ssh_host: prod-vm.indyhackers.org
    secrets:
      ssh_key: ${{ secrets.SSH_KEY_PROD }}
      ts_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      ts_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}
      slack_webhook: ${{secrets.SLACK_NOTIFY_WEBHOOK }}

  cd-dev:
    if: github.ref == 'refs/heads/dev'
    needs: [build]
    uses: ./.github/workflows/cd.yaml
    with:
      image: ${{ needs.build.outputs.image }}
      ssh_user: indyhackers
      ssh_host: dev-vm.indyhackers.org
    secrets:
      ssh_key: ${{ secrets.SSH_KEY_PROD }}
      ts_oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      ts_oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}
      slack_webhook: ${{secrets.SLACK_NOTIFY_WEBHOOK }}
